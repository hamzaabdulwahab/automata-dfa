<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fbf7ed" />
    <title>Signing you in · Automata Studio</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..600&family=Inter+Tight:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap"
    />
    <script>
      (function () {
        try {
          var t = localStorage.getItem("automata-dfa:theme");
          if (t !== "light" && t !== "dark") {
            t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          }
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <main style="min-height: 100dvh; display: grid; place-items: center; padding: 24px">
      <section style="text-align: center; max-width: 360px">
        <p class="eyebrow" style="margin-bottom: 14px">Verifying identity</p>
        <h1
          class="h1"
          style="font-family: var(--font-display); font-weight: 450; font-size: 1.5rem; letter-spacing: -0.015em"
        >
          One moment.
        </h1>
        <p
          id="status"
          class="auth-epigraph"
          style="margin-top: 16px; font-family: var(--font-mono); font-size: 0.8125rem; color: var(--color-ink-muted)"
        >
          Completing redirect…
        </p>
      </section>
    </main>
    <script type="module" src="/src/sso-callback.entry.js"></script>
  </body>
</html>
